<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La sala de makinas - Bird Hunt Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; width: 480px; height: 800px; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// --- IMÁGENES ---
const portadaImg = new Image(); portadaImg.src = 'portada.png';
const lajefaImg = new Image(); lajefaImg.src = 'lajefa-aleteo.png';
const eljefeImg = new Image(); eljefeImg.src = 'eljefe-aleteo.png';
const perroImg = new Image(); perroImg.src = 'perro.png';
const perroRecogeImg = new Image(); perroRecogeImg.src = 'perro-recoge.png';
const treeImg = new Image(); treeImg.src = 'arbol.png';

// --- AUDIO ---
const dogLaughAudio = new Audio('perro-risa.ogg');
dogLaughAudio.preload = 'auto';
const dogRetrieveAudio = new Audio('perro-recoge.ogg');
dogRetrieveAudio.preload = 'auto';

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() { 
    if (!audioCtx) audioCtx = new AudioCtx(); 
    if (audioCtx.state === 'suspended') audioCtx.resume(); 
}

function playShoot() {
    if (!audioCtx) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0); for(let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    const n = audioCtx.createBufferSource(); n.buffer = buf;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.8, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    n.connect(g); g.connect(audioCtx.destination); n.start();
}

function playHit() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(400, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.25);
}

function playDogLaugh() {
    dogLaughAudio.currentTime = 0;
    dogLaughAudio.play().catch(() => {});
}

function playDogRetrieve() {
    if(dogRetrieveAudio) {
        dogRetrieveAudio.currentTime = 0;
        dogRetrieveAudio.play().catch(() => {});
    }
}

function playFlap() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(150, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playFanfare() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = [261.63, 329.63, 392.00, 523.25];
    notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = freq;
        const start = now + i * 0.15;
        g.gain.setValueAtTime(0, start); g.gain.linearRampToValueAtTime(0.3, start + 0.02);
        g.gain.setValueAtTime(0.3, start + 0.12); g.gain.linearRampToValueAtTime(0, start + 0.25);
        o.connect(g); g.connect(audioCtx.destination); o.start(start); o.stop(start + 0.25);
    });
}

function playRoundStart() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function playBonus() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(800, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
}

// --- CANVAS ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GW = 480, GH = 800;
canvas.width = GW; canvas.height = GH;

function fitCanvas() {
    const scaleX = window.innerWidth / GW;
    const scaleY = window.innerHeight / GH;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = `${GW * scale}px`;
    canvas.style.height = `${GH * scale}px`;
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// --- ESTADO DEL JUEGO ---
let gameState = 'LOADING';
let loadingTimer = 0;
const LOAD_DURATION = 360; // 6 segundos
let menuOption = 0;
let switchTimer = 0;

// --- JUGADORES ---
let numPlayers = 1;
let currentPlayer = 0;
let players = [
    { score: 0, lives: 3, round: 1 },
    { score: 0, lives: 3, round: 1 }
];

// --- GAMEPLAY ---
let ducksProcessed = 0;
let ducksHit = 0;
let shots = 3;
let particles = [];

let dog = {
    x: GW/2, y: GH, targetY: GH, state: 'HIDDEN', action: null, w: 140, h: 140, timer: 0
};

let currentDuck = null;
let duckTimer = 0;

const grassH = GH * 0.2, grassY = GH - grassH;
const tree = { x: 10, w: 177, h: 180 };
const clouds = [
    { x: 50, y: 80, w: 70, s: 0.3 }, { x: 200, y: 150, w: 90, s: 0.4 }, { x: 350, y: 100, w: 80, s: 0.35 }
];

// ============================================
// ✅ CLASE PARTÍCULA
// ============================================
class Particle {
    constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 20;
        this.y = y + (Math.random() - 0.5) * 20;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.decay = 0.02 + Math.random() * 0.02;
        this.size = 3 + Math.random() * 5;
        const colors = ['#FFFFFF', '#FFE4B5', '#8B4513', '#FF6B6B'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.3;
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
    }
}

function getPlayer() { return players[currentPlayer]; }
function getSpeedMult() { return Math.min(1 + (getPlayer().round - 1) * 0.25, 2.0); }

function spawnDuck() {
    const type = Math.random() < 0.5 ? 'lajefa' : 'eljefe';
    const baseSpeed = (2.5 + getPlayer().round * 0.5) * getSpeedMult();
    let x, y, vx, vy;
    
    const edge = Math.floor(Math.random() * 3);
    switch(edge) {
        case 0: x = Math.random() * (GW - 120) + 60; y = -120; vx = (Math.random() - 0.5) * baseSpeed * 1.2; vy = baseSpeed; break;
        case 1: x = -120; y = Math.random() * (grassY * 0.6) + 50; vx = baseSpeed; vy = (Math.random() - 0.5) * baseSpeed * 1.2; break;
        case 2: x = GW + 120; y = Math.random() * (grassY * 0.6) + 50; vx = -baseSpeed; vy = (Math.random() - 0.5) * baseSpeed * 1.2; break;
    }

    currentDuck = {
        type, x, y, w: 120, h: 120, vx, vy,
        dir: vx > 0 ? 1 : -1,
        changeTimer: 40 + Math.random() * 60,
        frame: 0, frameTimer: 0,
        active: true, alpha: 0, fadeIn: 0.06
    };
    shots = 3;
    duckTimer = 0;
}

function triggerHit() {
    currentDuck.active = false;
    
    let points = 500;
    if (currentDuck.y < grassY * 0.4) points = 1500;
    else if (currentDuck.y < grassY * 0.7) points = 1000;
    getPlayer().score += points;
    
    const numParticles = 30 + Math.floor(Math.random() * 10);
    for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle(currentDuck.x + currentDuck.w/2, currentDuck.y + currentDuck.h/2));
    }

    dog.state = 'RISING';
    dog.action = 'RETRIEVE';
    dog.x = Math.max(currentDuck.x, 200); 
    dog.targetY = grassY - 120;
    dog.timer = 0;
    
    playHit();
    playDogRetrieve();
}

function triggerMiss() {
    if (currentDuck && currentDuck.active) currentDuck.active = false;
    getPlayer().lives--;
    
    dog.state = 'RISING';
    dog.action = 'LAUGH';
    dog.x = GW/2;
    dog.targetY = grassY - 100;
    dog.timer = 0;
    
    playDogLaugh();
}

function finishDogAnimation() {
    dog.state = 'HIDDEN';
    dog.y = GH;
    currentDuck = null;
    
    if (duckTimer > 360) {
        ducksProcessed++;
        if (getPlayer().lives <= 0) gameState = 'GAME_OVER';
        else if (ducksProcessed >= 10) gameState = 'ROUND_END';
        else gameState = 'FLYING';
    } else {
        ducksHit++;
        ducksProcessed++;
        if (ducksProcessed >= 10) gameState = 'ROUND_END';
        else gameState = 'FLYING';
    }
}

function nextRound() {
    const player = getPlayer();
    if (ducksHit === 10) {
        player.score += 10000;
        playBonus();
    }
    ducksHit = 0;
    ducksProcessed = 0;
    player.round++;
    
    if (numPlayers === 2) {
        currentPlayer = 1 - currentPlayer;
        gameState = 'PLAYER_SWITCH';
        switchTimer = 120;
        return;
    }

    playRoundStart();
    currentDuck = null;
    gameState = 'FLYING';
}

function startGame() {
    initAudio();
    playFanfare();
    
    players = [{ score: 0, lives: 3, round: 1 }, { score: 0, lives: 3, round: 1 }];
    currentPlayer = 0;
    ducksHit = 0;
    ducksProcessed = 0;
    currentDuck = null;
    particles = [];
    
    dog.state = 'HIDDEN';
    dog.y = GH;
    
    gameState = 'FLYING';
}

// --- UPDATE ---
function update() {
    clouds.forEach(c => { c.x += c.s; if (c.x - c.w > GW) { c.x = -c.w; c.y = Math.random() * (GH * 0.4); } });
    
    if (gameState === 'LOADING') {
        loadingTimer++;
        if (loadingTimer >= LOAD_DURATION) {
            gameState = 'MENU';
        }
        return;
    }
    
    if (gameState === 'MENU') return;
    
    if (gameState === 'PLAYER_SWITCH') {
        switchTimer--;
        if (switchTimer <= 0) {
            playRoundStart();
            currentDuck = null;
            gameState = 'FLYING';
        }
        return;
    }
    
    if (gameState === 'FLYING' && !currentDuck) spawnDuck();
    
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());

    if (dog.state === 'RISING') {
        dog.y -= 4; 
        if (dog.y <= dog.targetY) { dog.y = dog.targetY; dog.state = dog.action; dog.timer = 0; }
    } else if (dog.state === 'LAUGH' || dog.state === 'RETRIEVE') {
        dog.timer++;
        if (dog.timer > 90) dog.state = 'FALLING';
    } else if (dog.state === 'FALLING') {
        dog.y += 4; 
        if (dog.y >= GH) finishDogAnimation();
    }

    if (gameState === 'FLYING' && currentDuck && currentDuck.active) {
        if (currentDuck.alpha < 1) currentDuck.alpha += currentDuck.fadeIn;
        
        currentDuck.frameTimer++;
        if (currentDuck.frameTimer > 8) { currentDuck.frame = 1 - currentDuck.frame; currentDuck.frameTimer = 0; playFlap(); }
        
        currentDuck.x += currentDuck.vx;
        currentDuck.y += currentDuck.vy;
        
        const marginX = currentDuck.w * 0.2;
        const limitTop = 40;
        const limitBottom = grassY - currentDuck.h * 0.5;
        
        if (currentDuck.x < -marginX) { currentDuck.x = -marginX; currentDuck.vx = Math.abs(currentDuck.vx); }
        else if (currentDuck.x > GW - currentDuck.w + marginX) { currentDuck.x = GW - currentDuck.w + marginX; currentDuck.vx = -Math.abs(currentDuck.vx); }
        if (currentDuck.y < limitTop) { currentDuck.y = limitTop; currentDuck.vy = Math.abs(currentDuck.vy); }
        else if (currentDuck.y > limitBottom) { currentDuck.y = limitBottom; currentDuck.vy = -Math.abs(currentDuck.vy); }
        
        currentDuck.changeTimer--;
        if (currentDuck.changeTimer <= 0) {
            let ang = Math.atan2(currentDuck.vy, currentDuck.vx) + (Math.random() - 0.5) * Math.PI * 0.6;
            let sp = Math.hypot(currentDuck.vx, currentDuck.vy);
            currentDuck.vx = Math.cos(ang) * sp;
            currentDuck.vy = Math.sin(ang) * sp;
            currentDuck.changeTimer = 40 + Math.random() * 60;
        }
        currentDuck.dir = currentDuck.vx > 0 ? 1 : -1;
        
        duckTimer++;
        if (duckTimer > 360) triggerMiss();
    }
    
    if (gameState === 'ROUND_END') {
        if (!window.roundTimer) window.roundTimer = 180;
        window.roundTimer--;
        if (window.roundTimer <= 0) {
            window.roundTimer = 0;
            if (getPlayer().lives <= 0) gameState = 'GAME_OVER';
            else nextRound();
        }
    } else { window.roundTimer = 180; }
}

// --- DIBUJO ---
function drawCloud(x, y, w) {
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath(); ctx.arc(x, y, w*0.3, 0, Math.PI*2); ctx.arc(x+w*0.35, y-w*0.1, w*0.35, 0, Math.PI*2);
    ctx.arc(x+w*0.7, y, w*0.3, 0, Math.PI*2); ctx.arc(x+w*0.35, y+w*0.15, w*0.3, 0, Math.PI*2); ctx.fill();
}

function drawTree() {
    ctx.save();
    const ty = grassY - tree.h + 20; const tx = tree.x;
    if (treeImg && treeImg.complete && treeImg.naturalWidth > 10) ctx.drawImage(treeImg, tx, ty, tree.w, tree.h);
    else { ctx.fillStyle = "#8B4513"; ctx.fillRect(tx+70, ty+100, 40, 80); ctx.fillStyle="#228B22"; ctx.beginPath(); ctx.arc(tx+88, ty+80, 60, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
}

function drawDuck(d) {
    if (!d || !d.active) return;
    ctx.save();
    ctx.globalAlpha = d.alpha || 1;
    ctx.translate(d.x + d.w/2, d.y + d.h/2);
    ctx.scale(d.dir, 1);
    const img = d.type === 'eljefe' ? eljefeImg : lajefaImg;
    if (img && img.complete && img.naturalWidth > 10) {
        const fw = img.width/2, fh = img.height;
        ctx.drawImage(img, d.frame * fw, 0, fw, fh, -d.w/2, -d.h/2, d.w, d.h);
    } else { ctx.fillStyle = d.type === 'eljefe' ? "#FF3333" : "#FF00FF"; ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h); }
    ctx.restore();
}

// ✅ PERRO
function drawDog() {
    if (dog.state === 'HIDDEN') return;
    let dx = dog.x - 70;
    if (dx < 190) dx = 190; 
    
    if (dog.action === 'RETRIEVE') {
        ctx.drawImage(perroRecogeImg, dx, dog.y, 140, 140);
    } else {
        ctx.drawImage(perroImg, dx, dog.y, 140, 140);
    }
}

// ✅ MENÚ
function drawMenu() {
    ctx.fillStyle = "#5C94FC";
    ctx.fillRect(0, 0, GW, GH);
    
    ctx.fillStyle = "#FF0000";
    ctx.font = "bold 38px Courier New";
    ctx.textAlign = "center";
    ctx.fillText("La sala de makinas", GW/2, 160);
    
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 24px Courier New";
    ctx.fillText("Bird Hunt Edition", GW/2, 200);
    
    const btnW = 280, btnH = 55;
    const btnX = (GW - btnW) / 2;
    const btn1Y = 320;
    const btn2Y = 400;
    
    ctx.fillStyle = "#000000";
    ctx.fillRect(btnX, btn1Y, btnW, btnH);
    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 3;
    ctx.strokeRect(btnX, btn1Y, btnW, btnH);
    ctx.fillStyle = "#00FF00";
    ctx.font = "bold 22px Courier New";
    ctx.fillText("1 PLAYER", GW/2, btn1Y + 36);
    
    ctx.fillStyle = "#000000";
    ctx.fillRect(btnX, btn2Y, btnW, btnH);
    ctx.strokeStyle = "#FFFFFF";
    ctx.strokeRect(btnX, btn2Y, btnW, btnH);
    ctx.fillStyle = "#00FF00";
    ctx.fillText("2 PLAYERS", GW/2, btn2Y + 36);
    
    ctx.textAlign = "left";
}

// ✅ PANTALLA DE CARGA MEJORADA
function drawLoading() {
    // 1. Imagen de fondo
    if (portadaImg.complete) {
        ctx.drawImage(portadaImg, 0, 0, GW, GH);
    } else {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, GW, GH);
    }

    const progress = loadingTimer / LOAD_DURATION;
    
    // 2. Configuración de la barra (Más estrecha y fina)
    const barW = 220;
    const barH = 6;
    const barX = (GW - barW) / 2;
    const barY = GH - 100; 
    const radius = 3;

    // Helper para rectángulos redondeados
    function pathRoundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // 3. Fondo de la barra
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    pathRoundRect(barX, barY, barW, barH, radius);
    ctx.fill();

    // 4. Progreso con gradiente llamativo
    if (progress > 0) {
        const gradient = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        gradient.addColorStop(0, "#00FF00");
        gradient.addColorStop(1, "#FFFF00");
        ctx.fillStyle = gradient;
        
        const progressW = Math.max(radius * 2, barW * progress);
        pathRoundRect(barX, barY, progressW, barH, radius);
        ctx.fill();
    }

    // 5. Texto debajo
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 14px Courier New";
    ctx.textAlign = "center";
    ctx.fillText("CARGANDO...", GW/2, barY + 25);
    ctx.textAlign = "left";
}

function draw() {
    if (gameState === 'LOADING') {
        drawLoading();
        return;
    }

    if (gameState === 'MENU') { drawMenu(); return; }
    
    if (gameState === 'PLAYER_SWITCH') {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, GW, GH);
        
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 48px Courier New";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(`PLAYER ${currentPlayer + 1}`, GW/2, GH/2);
        
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        return;
    }
    
    ctx.clearRect(0, 0, GW, GH);
    ctx.fillStyle = "#5C94FC"; ctx.fillRect(0, 0, GW, GH);
    clouds.forEach(c => drawCloud(c.x, c.y, c.w));
    
    drawDog();
    particles.forEach(p => p.draw(ctx));

    ctx.fillStyle = "#80D010"; ctx.fillRect(0, grassY, GW, grassH);
    ctx.fillStyle = "#00E800"; for(let i=0; i<GW; i+=12) ctx.fillRect(i, grassY, 3, 12);
    
    drawTree();
    if (currentDuck) drawDuck(currentDuck);
    
    // HUD
    const hudH = 60, hudY = GH - hudH;
    ctx.fillStyle = "#603000"; ctx.fillRect(0, hudY, GW, hudH);
    
    if (numPlayers === 2) {
        ctx.font = "bold 16px Courier New";
        ctx.fillStyle = currentPlayer === 0 ? "#FFFF00" : "#FFFFFF";
        ctx.fillText(`P1: ${players[0].score}`, 10, hudY+20);
        ctx.fillStyle = currentPlayer === 1 ? "#FFFF00" : "#FFFFFF";
        ctx.fillText(`P2: ${players[1].score}`, 10, hudY+45);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 16px Courier New";
        ctx.fillText(`LIVES: ${getPlayer().lives}`, 140, hudY+25);
        ctx.fillText(`ROUND: ${getPlayer().round}`, 140, hudY+45);
    } else {
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 18px Courier New";
        ctx.fillText(`LIVES: ${getPlayer().lives}`, 10, hudY+25);
        ctx.fillText(`ROUND: ${getPlayer().round}`, 10, hudY+45);
        ctx.fillText(`SCORE: ${getPlayer().score}`, 140, hudY+35);
    }

    ctx.fillStyle = "#00FF00"; ctx.font = "bold 18px Courier New";
    ctx.fillText(`SHOTS: ${shots}`, GW-120, hudY+35);
    
    if (numPlayers === 2) {
        ctx.fillStyle = "#FF0000"; ctx.font = "bold 20px Courier New"; ctx.textAlign = "center";
        ctx.fillText(`PLAYER ${currentPlayer + 1}'S TURN`, GW/2, 40); ctx.textAlign = "left";
    }
    
    if (gameState === 'ROUND_END') {
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
        const rw = 340, rh = 90;
        const rx = (GW - rw) / 2, ry = GH/2 - rh/2;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(rx, ry, rw, rh, 16);
        else ctx.rect(rx, ry, rw, rh);
        ctx.fill();
        
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 26px Courier New"; ctx.textAlign = "center";
        ctx.fillText(`ROUND ${getPlayer().round} COMPLETE`, GW/2, GH/2 + 5);
        
        if (numPlayers === 1) {
            ctx.fillStyle = "#FFFFFF"; ctx.font = "20px Courier New";
            ctx.fillText(`NEXT: ROUND ${getPlayer().round + 1}`, GW/2, GH/2 + 35);
        }
        ctx.textAlign = "left";
    } else if (gameState === 'GAME_OVER') {
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, GW, GH);
        ctx.fillStyle = "#FF0000"; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center";
        ctx.fillText("GAME OVER", GW/2, GH/2 - 40);
        
        if (numPlayers === 2) {
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 24px Courier New";
            ctx.fillText(`PLAYER 1: ${players[0].score}`, GW/2, GH/2 + 10);
            ctx.fillText(`PLAYER 2: ${players[1].score}`, GW/2, GH/2 + 40);
            const winner = players[0].score > players[1].score ? "PLAYER 1 WINS!" : players[1].score > players[0].score ? "PLAYER 2 WINS!" : "DRAW!";
            ctx.fillStyle = "#FFD700"; ctx.font = "bold 28px Courier New";
            ctx.fillText(winner, GW/2, GH/2 + 90);
        } else {
            ctx.fillStyle = "#FFF"; ctx.font = "20px Courier New";
            ctx.fillText(`FINAL SCORE: ${players[0].score}`, GW/2, GH/2 + 20);
        }
        ctx.textAlign = "left";
    }
}

// --- INPUT ---
function handleShoot(e) {
    e.preventDefault();
    
    if (gameState === 'LOADING') return;

    if (gameState === 'MENU') {
        const rect = canvas.getBoundingClientRect();
        const scaleX = GW / rect.width;
        const scaleY = GH / rect.height;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const gx = (cx - rect.left) * scaleX;
        const gy = (cy - rect.top) * scaleY;
        
        const btnW = 280, btnH = 55;
        const btnX = (GW - btnW) / 2;
        
        if (gx >= btnX && gx <= btnX + btnW && gy >= 320 && gy <= 375) {
            numPlayers = 1;
            startGame();
            return;
        }
        if (gx >= btnX && gx <= btnX + btnW && gy >= 400 && gy <= 455) {
            numPlayers = 2;
            startGame();
            return;
        }
        return;
    }
    
    initAudio();
    if (gameState !== 'FLYING' || !currentDuck || !currentDuck.active) return;
    if (shots <= 0) return;
    
    playShoot(); shots--;
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = GW / rect.width, scaleY = GH / rect.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const gx = (cx - rect.left) * scaleX, gy = (cy - rect.top) * scaleY;
    
    if (gx >= currentDuck.x-15 && gx <= currentDuck.x+currentDuck.w+15 && 
        gy >= currentDuck.y-15 && gy <= currentDuck.y+currentDuck.h+15) {
        triggerHit();
    } else if (shots === 0) {
        triggerMiss();
    }
}

canvas.addEventListener('mousedown', handleShoot); 
canvas.addEventListener('touchstart', handleShoot, {passive:false});

// --- INIT ---
gameState = 'LOADING';
(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
